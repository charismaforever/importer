function log(msg, type='') {
  const div = document.getElementById('log');
  const p = document.createElement('p');
  if (type) p.className = type;
  p.textContent = msg;
  div.appendChild(p);
  div.scrollTop = div.scrollHeight;
}

async function startImport() {
  const token = document.getElementById('token').value.trim();
  if (!token) { alert('Please enter your Sanity API token'); return; }

  document.getElementById('startBtn').disabled = true;
  document.getElementById('progressDiv').style.display = 'block';

  const total = PRODUCTS.length;
  let done = 0;
  let errors = 0;

  log(`Starting import of ${total} products...`, 'info');

  // Process in batches of 20
  const batchSize = 20;
  for (let i = 0; i < total; i += batchSize) {
    const batch = PRODUCTS.slice(i, i + batchSize);
    const mutations = batch.map(doc => ({ createOrReplace: doc }));

    try {
      const res = await fetch(
        `https://${PROJECT_ID}.api.sanity.io/v2025-04-01/data/mutate/${DATASET}`,
        {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ mutations })
        }
      );

      const data = await res.json();
      if (!res.ok) {
        errors++;
        log(`Batch ${Math.floor(i/batchSize)+1} error: ${data.error?.description || res.status}`, 'err');
      } else {
        done += batch.length;
        log(`Imported ${done}/${total} — ${batch[0].title}...`, 'ok');
      }
    } catch(e) {
      errors++;
      log(`Batch error: ${e.message}`, 'err');
    }

    // Update progress bar
    const pct = Math.round((done / total) * 100);
    document.getElementById('barFill').style.width = pct + '%';
    document.getElementById('status').textContent = `${done} of ${total} products imported (${errors} errors)`;

    // Small delay to avoid rate limiting
    await new Promise(r => setTimeout(r, 300));
  }

  if (errors === 0) {
    log(`✓ All ${done} products imported successfully!`, 'info');
    document.getElementById('status').textContent = `✓ Complete — ${done} products imported to Sanity`;
  } else {
    log(`Import complete: ${done} succeeded, ${errors} failed`, 'info');
  }

  document.getElementById('startBtn').disabled = false;
}
</script>
